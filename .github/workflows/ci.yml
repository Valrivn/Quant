name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]" 2>/dev/null || pip install pytest pytest-asyncio pytest-cov pytest-mock numpy pandas scipy nltk vaderSentiment python-dotenv pyyaml
    
    - name: Download NLTK data
      run: |
        python -c "import nltk; nltk.download('vader_lexicon', quiet=True); nltk.download('punkt', quiet=True)"
    
    - name: Run tests
      run: |
        python -m pytest tests/ -v --tb=short --cov=psychological --cov=scraper --cov=config --cov-report=term-missing --cov-fail-under=60
    
    - name: Type check
      run: |
        python -m mypy psychological/ scraper/ config/ --ignore-missing-imports 2>/dev/null || true

  lint:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    
    - name: Install linting tools
      run: |
        pip install ruff black
    
    - name: Run ruff
      run: |
        ruff check psychological/ scraper/ config/ scripts/
    
    - name: Run black
      run: |
        black --check psychological/ scraper/ config/ scripts/

  audit:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    
    - name: Run audit script
      run: |
        python audit_script.py